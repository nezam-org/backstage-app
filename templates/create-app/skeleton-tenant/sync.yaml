# templates/tenant/sync.yaml
# NB file-location ≠ object-namespace: GitRepositories live in flux-system
# (shared source-auth secret); Kustomizations live in the tenant env
# namespaces because SA impersonation binds THERE. Cross-ns sourceRef is a
# DELIBERATE deviation from Flux hard-multi-tenancy (trusted collaborators —
# see 024 context).
# STAGING source tracks `main` (trunk-based, 031). The tenant repo's `main` is
# protected at 1 required approval; the 025 CI does NOT direct-push — it opens a
# short-lived PR that bumps the staging image tag, which the app owner approves
# (auto-merge then lands it on main with [skip ci]). Flux deploys the resolved
# tag straight off the trunk. No long-lived deploy branch.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: __USER__-__APP__-main
  namespace: flux-system
  labels:
    backstage.io/kubernetes-id: __APP__ # Backstage k8s tab (027 T3)
spec:
  interval: 1m
  url: https://github.com/__USER__/__APP__
  ref:
    branch: main
  provider: github
  secretRef:
    name: github-app-__USER__
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: __USER__-__APP__-release
  namespace: flux-system
  labels:
    backstage.io/kubernetes-id: __APP__ # Backstage k8s tab (027 T3)
spec:
  interval: 1m
  url: https://github.com/__USER__/__APP__
  ref:
    semver: '>=0.0.1' # prod ships ONLY tags; highest semver wins (rollback = higher tag)
  provider: github
  secretRef:
    name: github-app-__USER__
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-staging
  namespace: __USER__-__APP__-staging
  labels:
    backstage.io/kubernetes-id: __APP__ # Backstage k8s tab (027 T3)
spec:
  interval: 10m
  path: ./deploy/staging
  prune: true
  wait: true
  timeout: 3m
  serviceAccountName: flux-tenant
  targetNamespace: __USER__-__APP__-staging
  sourceRef:
    kind: GitRepository
    name: __USER__-__APP__-main
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-prod
  namespace: __USER__-__APP__-prod
  labels:
    backstage.io/kubernetes-id: __APP__ # Backstage k8s tab (027 T3)
spec:
  interval: 10m
  path: ./deploy/prod
  prune: true
  wait: true
  timeout: 3m
  serviceAccountName: flux-tenant
  targetNamespace: __USER__-__APP__-prod
  sourceRef:
    kind: GitRepository
    name: __USER__-__APP__-release
    namespace: flux-system
