apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-app
  title: Create an app on the Nezam platform
  description: >-
    Scaffold a FastAPI + React app from the platform template, create the repo
    in YOUR GitHub account, and register it on the platform (staging + prod
    envs, DB, network fence, GitOps sync) — fully automatic; your app is live
    on its staging URL a few minutes after this form.
  tags:
    - fastapi
    - react
    - recommended
spec:
  owner: ma-shaaban
  type: service

  # ---------------------------------------------------------------------------
  # FORM
  # ---------------------------------------------------------------------------
  parameters:
    - title: Your app
      required:
        - appName
        - description
      properties:
        appName:
          title: App name
          type: string
          description: >-
            This is your app AND GitHub repository name. It creates
            `<your-github-login>/<name>` in your account. Lowercase letters,
            numbers and dashes only. Also becomes the hostnames
            (<app>-staging.nezam.site / <app>.nezam.site) and the tenant
            namespaces. Keep it short — the derived Postgres role
            (<user>_<app>) must stay under 55 chars.
          # Mirror the register-tenant.sh constraint: ^[a-z0-9-]+$.
          pattern: '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'
          maxLength: 40
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: One line describing what the app does.

        # ---------------------------------------------------------------------
        # ONE name only. There is NO repo picker — the repo is ALWAYS
        # <signed-in user>/<appName>, so app name and repo name CANNOT diverge
        # (the bug this template previously allowed: appName=nezam-todo but
        # repo=nezam-todo-app → Flux pointed at a repo that didn't exist).
        #
        # The RepoUrlPicker used to also mint the user OAuth token (via
        # requestUserCredentials). It's gone, so this custom field extension
        # (packages/app/src/scaffolder/GithubRepoTokenField) mints the same
        # token — github.com, scopes [repo, workflow] — and injects it as the
        # scaffolder secret ${{ secrets.USER_OAUTH_TOKEN }} that publish:github
        # consumes below. It renders a one-line "connecting to GitHub" note.
        #   repo     — create + push the user's new repository.
        #   workflow — the batteries-included scaffold ships a CI workflow
        #              (.github/workflows/ci.yaml); GitHub refuses to let an
        #              OAuth token push ANY file under .github/workflows/
        #              without this scope (027 T4, 2026-07-12).
        # ---------------------------------------------------------------------
        githubToken:
          title: GitHub access
          type: string
          ui:field: GithubRepoToken

  # ---------------------------------------------------------------------------
  # STEPS
  # ---------------------------------------------------------------------------
  steps:
    # 0. Guard the derived Postgres role length BEFORE anything is created.
    #    register-tenant.sh HARD-FAILS if the role (<owner>_<app>, dashes → _)
    #    exceeds 55 chars. The form bounds appName (maxLength 40) but cannot see
    #    the variable-length <owner> (the signed-in user's GitHub login), so a
    #    long username + long app name can compose an over-limit role that would
    #    otherwise only blow up much later (register-tenant.sh / CNPG). Fail
    #    FAST here with a clear message. `value` uses the SAME nunjucks
    #    expression that step 6 stamps into database.yaml's `owner:` field, so
    #    the length counted here IS the real role length.
    #    owner = ${{ user.entity.metadata.name }} — sign-in uses
    #    usernameMatchingUserEntityName, so the Backstage user entity name IS
    #    the GitHub login.
    - id: assert-role-length
      name: Check the derived Postgres role fits (≤ 55 chars)
      action: nezam:assert:maxLength
      input:
        value: ${{ (user.entity.metadata.name + "-" + parameters.appName) | replace("-", "_") }}
        max: 55
        message: Postgres role

    # 1. Owner is the signed-in user — ${{ user.entity.metadata.name }}. There
    #    is NO repo picker: the repo is ALWAYS <owner>/<appName>, so app name
    #    and repo name cannot diverge.

    # 2. Fetch the app template VERBATIM. fetch:plain copies bytes untouched —
    #    it does NOT run nunjucks — so the template's literal __USER__/__APP__
    #    placeholders survive intact (they are NOT ${{ }} nunjucks and would
    #    otherwise be a parse hazard). Single source of truth: the template
    #    repo, exactly as scripts/init.sh consumes it.
    - id: fetch-app
      name: Fetch the app template
      action: fetch:plain
      input:
        url: https://github.com/ma-shaaban/template-fastapi-react/tree/main
        targetPath: ./app
        # Read the (public) template repo via the platform GitHub App
        # integration; no user token needed just to READ it.

    # 3. Personalise the app copy — literal substitution, the scaffolder
    #    equivalent of scripts/init.sh's `sed __USER__→user __APP__→app`.
    - id: personalise-app
      name: Personalise the app (init.sh equivalent)
      action: nezam:fs:replace
      input:
        globPattern: app/**/*
        replacements:
          # ORDER: no compound __USER_____APP__ token exists in the APP repo
          # (that token is platform-tenant-only), so plain user/app is safe.
          - find: __USER__
            replaceWith: ${{ user.entity.metadata.name }}
          - find: __APP__
            replaceWith: ${{ parameters.appName }}

    # 4. Create the repo in the USER's account with the user's OAuth token.
    #    The publish target is built HERE from the single appName + the derived
    #    owner: github.com?owner=<signed-in user>&repo=<appName>. There is no
    #    user-supplied repo name — appName IS the repo name. publish:github
    #    creates + pushes; the token (secret USER_OAUTH_TOKEN, minted by the
    #    GithubRepoToken field) carries repo + workflow scope.
    #
    #    Trunk-based deploy (031): main is protected at 1 required approval —
    #    publish:github's defaults (protectDefaultBranch=true,
    #    requiredApprovingReviewCount=1) are LEFT UNSET on purpose, so main is
    #    the owner's approval gate for the staging deploy PR. allowAutoMerge=true
    #    sets `allow_auto_merge` on the repo so that, once the owner approves the
    #    025 CI's short-lived image-tag-bump PR, GitHub merges it automatically
    #    (with [skip ci]) and Flux deploys the tag off main. The companion
    #    "Allow GitHub Actions to create pull requests" + write workflow
    #    permission (no publish:github input exists) is set by the next step.
    - id: publish-app
      name: Create your repository
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ user.entity.metadata.name }}&repo=${{ parameters.appName }}
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
        allowAutoMerge: true
        # 030 fix (hit live 2026-07-18): publish:github's DEFAULT
        # protectEnforceAdmins=true makes every OWNER-authored PR permanently
        # unmergeable on a solo repo — self-approval is banned, there is no
        # second collaborator, and bypass is disabled. Explicitly false: the
        # 1-approval rule still gates the BOT-authored deploy PRs (its real
        # job), while the owner keeps the admin bypass for their own PRs.
        protectEnforceAdmins: false
        # ── GATE SUSPENDED (ADR-028, owner ruling 2026-07-18: UX > security
        # for now) ── main used to be branch-protected (1 required approval),
        # which made the owner's approval the staging-release gate (ADR-025).
        # Suspended: repos are created UNPROTECTED and the template CI merges
        # its own deploy PR immediately (see template-fastapi-react ci.yaml,
        # same ADR). TO RESTORE THE GATE: delete this line (publish:github's
        # default protectDefaultBranch=true returns) AND revert the ci.yaml
        # merge step to `--auto --squash`.
        protectDefaultBranch: false
        sourcePath: ./app
        token: ${{ secrets.USER_OAUTH_TOKEN }}

    # 4b. Enable the deploy-PR automation on the just-created repo (031).
    #     publish:github has NO input for GitHub Actions PR-creation, and this
    #     account has "Allow GitHub Actions to create and approve pull requests"
    #     + default workflow permissions OFF by default. Without them the 025 CI's
    #     GITHUB_TOKEN cannot open the short-lived staging-tag-bump PR. This
    #     custom action (nezam:github:deploy-automation) sets both via
    #     PUT /repos/{owner}/{repo}/actions/permissions/workflow with the SAME
    #     user token that created the repo. Runs AFTER publish-app so the repo
    #     already exists.
    - id: enable-deploy-automation
      name: Enable deploy-PR automation on your repo
      action: nezam:github:deploy-automation
      input:
        owner: ${{ user.entity.metadata.name }}
        repo: ${{ parameters.appName }}
        token: ${{ secrets.USER_OAUTH_TOKEN }}

    # 5. Fetch the platform tenant skeleton VERBATIM (also __USER__/__APP__/
    #    __USER_____APP__ literal tokens). Bundled in THIS repo → read from the
    #    scaffolder workspace, no network. Mirrors templates/tenant/ in the
    #    platform repo 1:1 (+ the T3 backstage.io/kubernetes-id labels).
    #    037: the skeleton is fetched DIRECTLY into ./pr/... — everything under
    #    ./pr lands at the platform repo ROOT in one PR (tenant dir + the
    #    cluster.yaml managed-role edit fetched below).
    - id: fetch-tenant
      name: Fetch the tenant skeleton
      action: fetch:plain
      input:
        url: ./skeleton-tenant
        targetPath: ./pr/k8s/tenants/${{ user.entity.metadata.name }}/${{ parameters.appName }}

    # 6. Stamp the tenant dir — the scaffolder equivalent of
    #    scripts/register-tenant.sh. COMPOUND TOKEN FIRST: __USER_____APP__
    #    must be replaced before __USER__, else __USER__ eats the leading part
    #    of __USER_____APP__ and mangles the Postgres role (same ordering gotcha
    #    register-tenant.sh documents). dbRole = <user>_<app> with dashes → _.
    - id: personalise-tenant
      name: Personalise the tenant (register-tenant.sh equivalent)
      action: nezam:fs:replace
      input:
        # pr/**/* holds ONLY the skeleton at this point — cluster.yaml is
        # fetched AFTER this step, so the replace can never touch it.
        globPattern: pr/**/*
        replacements:
          - find: __USER_____APP__
            replaceWith: ${{ (user.entity.metadata.name + "-" + parameters.appName) | replace("-", "_") }}
          - find: __USER__
            replaceWith: ${{ user.entity.metadata.name }}
          - find: __APP__
            replaceWith: ${{ parameters.appName }}

    # 6b. Pull the CURRENT appdb cluster.yaml from the platform repo so the
    #     db-provision action can append this tenant's managed role — the edit
    #     rides the SAME PR as the tenant dir (037: one merged PR = app fully
    #     registered). Read auth: credentials provider → internal bot App.
    - id: fetch-cluster-yaml
      name: Fetch the platform appdb cluster.yaml
      action: fetch:plain:file
      input:
        url: https://github.com/nezam-org/nezam-devops-k3s/blob/main/k8s/platform/appdb/cluster.yaml
        targetPath: ./pr/k8s/platform/appdb/cluster.yaml

    # 6c. Generate the tenant DB credentials (037, enabled by ADR-027): the
    #     password is born inside the action and leaves it ONLY sops-encrypted
    #     (age recipient = the platform repo's .sops.yaml public key). Also
    #     appends the managed.roles entry to the fetched cluster.yaml. After
    #     this, NOTHING about registration is manual.
    - id: db-provision
      name: Provision the tenant database credentials (encrypted)
      action: nezam:tenant:db-provision
      input:
        user: ${{ user.entity.metadata.name }}
        app: ${{ parameters.appName }}
        ageRecipient: age14w6krfhmhpdfysedvennwf63d04ffp2w9h0uap3ax02xkrz4zcmq9hsmt0
        secretsPath: pr/k8s/tenants/${{ user.entity.metadata.name }}/${{ parameters.appName }}/secrets.sops.yaml
        clusterYamlPath: pr/k8s/platform/appdb/cluster.yaml

    # 7. Open the tenant-registration PR onto the platform repo. NO token input
    #    → the scaffolder's GithubCredentialsProvider auto-selects the GitHub
    #    App whose installation owns nezam-org/nezam-devops-k3s, i.e. the
    #    internal deployer-bot App (allowedInstallationOwners: [nezam-org] in
    #    app-config → the customer-facing App is never used for platform writes;
    #    it has no Contents:write). branchName is per-user-app to avoid clashes.
    - id: open-tenant-pr
      name: Open the tenant-registration PR
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=nezam-org&repo=nezam-devops-k3s
        branchName: tenant/${{ user.entity.metadata.name }}-${{ parameters.appName }}
        title: 'tenant: add ${{ user.entity.metadata.name }}/${{ parameters.appName }}'
        description: |
          ## New tenant app — audit trail (auto-merged, ADR-028)

          Requested via the developer portal by
          **@${{ user.entity.metadata.name }}**. This PR is merged
          automatically by the platform bot — the human approval gate is
          SUSPENDED (owner ruling 2026-07-18, ADR-028); this PR exists as the
          registration audit trail.

          - App repo (created in the user's account):
            `${{ user.entity.metadata.name }}/${{ parameters.appName }}`
          - Adds `k8s/tenants/${{ user.entity.metadata.name }}/${{ parameters.appName }}/`
            (staging + prod namespaces, quota, Cilium fence, RBAC impersonation,
            CNPG Databases, Flux GitRepositories + Kustomizations, PR-preview
            ResourceSet) — **including the sops-encrypted DB secrets** (037;
            the password was generated inside the scaffolder and exists only
            encrypted).
          - Appends this tenant's `managed.roles` entry to
            `k8s/platform/appdb/cluster.yaml`.

          ### Notes for the owner (nothing to do — informational)
          - If this is the user's FIRST app their Flux source secret
            (`k8s/tenants/${{ user.entity.metadata.name }}/github-app-${{ user.entity.metadata.name }}.sops.yaml`)
            must already exist, else the tenant GitRepositories sit NotReady
            until it does (runbook "Onboard a tenant user").
          - Hostname claims are first-come-first-served and NO LONGER human
            reviewed (gate suspended) — collisions surface as HTTPRoute
            conflicts.

          The app goes LIVE with no further action at
          https://${{ parameters.appName }}-staging.nezam.site
        # Everything under ./pr lands at the platform repo ROOT: the tenant
        # dir AND the cluster.yaml managed-role edit, one atomic PR (037).
        sourcePath: ./pr

    # 7b. ── GATE SUSPENDED (ADR-028, owner ruling 2026-07-18: UX > security
    #     for now) ── The tenant PR used to WAIT here for the platform owner's
    #     manual merge (approval + audit). Now the bot merges it immediately;
    #     the PR remains in history as the audit trail. TO RESTORE THE GATE:
    #     delete this step and revert the description wording above to
    #     "merge to approve".
    - id: merge-tenant-pr
      name: Register on the platform (auto-merge, ADR-028)
      action: nezam:github:merge-pr
      input:
        owner: nezam-org
        repo: nezam-devops-k3s
        pullNumber: ${{ steps['open-tenant-pr'].output.pullRequestNumber }}

    # 8. Register the new app's Component in the portal catalog so it shows up
    #    on the user's dashboard immediately (ties to T3). Reads catalog-info.yaml
    #    from the freshly-created user repo (via the platform App integration).
    - id: register
      name: Register in the catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-app'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
        optional: true

  # ---------------------------------------------------------------------------
  # OUTPUT (links shown on the "run complete" page)
  # ---------------------------------------------------------------------------
  output:
    links:
      - title: Your new repository
        url: ${{ steps['publish-app'].output.remoteUrl }}
      - title: Tenant-registration PR (audit trail — auto-merged, ADR-028)
        url: ${{ steps['open-tenant-pr'].output.remoteUrl }}
      - title: Your app URL (staging — live in a few minutes, no action needed)
        url: https://${{ parameters.appName }}-staging.nezam.site
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
