app:
  # Should be the same as backend.baseUrl when using the `app-backend` plugin.
  # Phase 1: tailnet URL (https://backstage.<tailnet>.ts.net), injected at
  # deploy time from the platform repo (k8s/apps/backstage).
  baseUrl: ${APP_BASE_URL}

backend:
  # The baseUrl is what browsers/clients use to reach the backend. Same value
  # as app.baseUrl because the app-backend plugin serves the frontend.
  baseUrl: ${APP_BASE_URL}
  # Object form (not the ':7007' shorthand): app-config.yaml already declares
  # backend.listen as an object, and Backstage's config merger requires a
  # consistent type across merged sources — a string override throws
  # "Invalid type in config for key 'backend.listen'". host 0.0.0.0 so the pod
  # is reachable from the Tailscale-operator proxy (the base config's implicit
  # default binds localhost only).
  listen:
    host: 0.0.0.0
    port: 7007

  # Shared CNPG PostgreSQL (`backstage` database on shared-pg, created by a
  # CNPG Database CR in the platform repo). All Backstage plugins share this
  # single database, divided by schema — the role only needs rights on this
  # one database, never CREATEDB.
  database:
    client: pg
    # One database, one schema per plugin (instead of one database per plugin)
    pluginDivisionMode: schema
    # The `backstage` database is provisioned by the platform (CNPG Database
    # CR) — Backstage must not attempt CREATE DATABASE.
    ensureExists: false
    # But it may create its per-plugin schemas inside that database.
    ensureSchemaExists: true
    knexConfig:
      pool:
        # Keep the pool small: connections (not RAM) are the scarce resource
        # on shared-pg, and ~20 plugins × pool.max adds up fast.
        min: 0
        max: 5
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
      ssl:
        # CNPG cluster CA, replicated into the backstage namespace and
        # mounted at /etc/cnpg (see platform repo k8s/apps/backstage).
        ca:
          $file: /etc/cnpg/ca.crt

# GitHub App credentials for repo actions (scaffolder publish, catalog
# discovery). This is the org-owned `nezam-platform` GitHub App — a DISTINCT
# credential from the GitHub OAuth app used for user sign-in (see
# auth.providers.github in app-config.yaml). All values are injected as env
# vars from a Kubernetes Secret at deploy time; GITHUB_APP_PRIVATE_KEY holds
# the full PEM (multiline env values are fine via Secret + valueFrom).
integrations:
  github:
    - host: github.com
      # TWO GitHub Apps on the SAME host. For any owner/repo Backstage's
      # GithubCredentialsProvider tries EVERY app in list order and uses the
      # FIRST that returns a token whose installation actually has access to
      # that repo (verified in @backstage/integration
      # SingleInstanceGithubCredentialsProvider.getAppToken: Promise.all over
      # apps → results.find(first with accessToken); an app whose
      # allowedInstallationOwners excludes the owner is skipped). So ORDER +
      # allowedInstallationOwners together make selection deterministic:
      #
      #   1. nezam-deployer-bot (INTERNAL, listed FIRST) — org-only, Contents +
      #      Pull-requests write on nezam-devops-k3s ONLY. allowedInstallationOwners
      #      [nezam-org] means it is CONSULTED ONLY for nezam-org repos; for the
      #      platform repo it is found first, so it is the identity the
      #      scaffolder's publish:github:pull-request uses for the
      #      tenant-registration PR (and the reader for the platform repo's
      #      catalog files). It never touches user repos. Its creds arrive as
      #      k8s Secret `github-app-deployer-bot` (ns backstage), populated by
      #      the orchestrator from the owner's App — NEVER invented here.
      #   2. nezam-platform (customer-facing, listed SECOND, unscoped) — installed
      #      on user accounts (+ nezam-org). Handles every non-nezam-org owner:
      #      reads private tenant repos for catalog discovery, and the sign-in
      #      allowlist. It deliberately has NO Contents:write on the platform
      #      repo (2026-07-12 boundary ruling); being listed after the scoped bot
      #      guarantees it is never the chosen writer for nezam-org.
      apps:
        # Deployer-bot FIRST so it wins the nezam-org lookup. See k8s/apps/backstage
        # deployer-bot Secret + extraEnvVarsSecrets wiring (platform repo).
        - appId: ${GITHUB_DEPLOYER_APP_ID}
          clientId: ${GITHUB_DEPLOYER_APP_CLIENT_ID}
          clientSecret: ${GITHUB_DEPLOYER_APP_CLIENT_SECRET}
          privateKey: ${GITHUB_DEPLOYER_APP_PRIVATE_KEY}
          webhookSecret: ${GITHUB_DEPLOYER_APP_WEBHOOK_SECRET}
          # Consulted ONLY for nezam-org repos; skipped for every other owner
          # (returns undefined → the platform app below handles user repos).
          allowedInstallationOwners:
            - nezam-org
        # Customer-facing nezam-platform — user repos + catalog discovery.
        - appId: ${GITHUB_APP_ID}
          clientId: ${GITHUB_APP_CLIENT_ID}
          clientSecret: ${GITHUB_APP_CLIENT_SECRET}
          privateKey: ${GITHUB_APP_PRIVATE_KEY}
          webhookSecret: ${GITHUB_APP_WEBHOOK_SECRET}

catalog:
  # Overrides the example locations from app-config.yaml.
  rules:
    - allow: [Component, System, API, Resource, Location, Template]
  locations:
    # Sign-in allowlist: User entities maintained in the platform repo.
    # Only usernames present here can sign in (usernameMatchingUserEntityName
    # resolver). Read via the GitHub App integration above.
    - type: url
      target: https://github.com/nezam-org/nezam-devops-k3s/blob/main/k8s/portal/allowlist-users.yaml
      rules:
        - allow: [User, Group]
    # (Tenant apps are no longer listed here: the scaffolder's catalog:register
    # adds a per-app location at create time. The old manual hello-nezam entry
    # was removed 2026-07-18 with the platform-wide app cleanup.)
    # Scaffolder templates (027 T4). The "Create an app" template lives in THIS
    # repo (nezam-org/backstage-app) under templates/create-app/. Registering it
    # as a catalog location makes it appear on the /create page. Read via the
    # platform GitHub App integration (public repo, but the App is the configured
    # reader). The template's steps (fetch:plain the user-facing app template,
    # literal placeholder substitution via nezam:fs:replace, publish:github with
    # the user's OAuth token, then publish:github:pull-request to the platform
    # repo via the deployer-bot App identity) are documented in the template.
    - type: url
      target: https://github.com/nezam-org/backstage-app/blob/main/templates/create-app/template.yaml
      rules:
        - allow: [Template]

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  # Custom resources the kubernetes tab fetches for an entity IN ADDITION to
  # the core workloads (deployments/pods/services/…). These are the CRs a
  # tenant app owns on this platform; each is matched to the entity the same
  # way as core workloads — by the backstage.io/kubernetes-id label on the CR
  # object (the platform applies that label to the tenant's Flux + CNPG CRs;
  # the app's own workloads get it from the repo's kustomize `labels`). The
  # read-only ServiceAccount ClusterRole (platform repo, k8s/apps/backstage/
  # service-account.yaml) grants get/list/watch on exactly these groups.
  customResources:
    # Flux GitOps objects (source + apply state for the app's envs).
    - group: 'source.toolkit.fluxcd.io'
      apiVersion: 'v1'
      plural: 'gitrepositories'
    - group: 'kustomize.toolkit.fluxcd.io'
      apiVersion: 'v1'
      plural: 'kustomizations'
    - group: 'helm.toolkit.fluxcd.io'
      apiVersion: 'v2'
      plural: 'helmreleases'
    # CNPG — the app's database (per-env Database CR) and, if it owns one, its
    # Postgres Cluster.
    - group: 'postgresql.cnpg.io'
      apiVersion: 'v1'
      plural: 'clusters'
    - group: 'postgresql.cnpg.io'
      apiVersion: 'v1'
      plural: 'databases'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        # In-cluster access: with authProvider serviceAccount and no
        # serviceAccountToken, Backstage uses the pod's mounted service
        # account token + CA automatically (read-only ClusterRole is bound in
        # the platform repo, T3).
        - name: nezam-k3s
          url: https://kubernetes.default.svc
          authProvider: 'serviceAccount'
          skipMetricsLookup: true
